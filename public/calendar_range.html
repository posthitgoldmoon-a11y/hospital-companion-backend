<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날짜 선택</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
h2 { text-align: center; font-size: 17px; color: #333; margin-bottom: 4px; }
.subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 16px; }
.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
.step { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; background: #eee; color: #aaa; }
.step.active { background: #4a90e2; color: white; }
.step.done { background: #e8f5e9; color: #43a047; }
.nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.nav button { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 10px; color: #4a90e2; }
.nav .month-title { font-size: 15px; font-weight: bold; color: #333; }
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
.weekdays span { font-size: 12px; color: #888; padding: 4px 0; }
.weekdays span:first-child { color: #e53935; }
.weekdays span:last-child { color: #1e88e5; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; color: #333; position: relative; }
.day:hover:not(.empty):not(.disabled) { background: #e3f0fc; }
.day.disabled { color: #ccc; cursor: default; }
.day.empty { cursor: default; }
.day.today { font-weight: bold; color: #4a90e2; }
.day.selected-start { background: #4a90e2; color: white; border-radius: 50% 0 0 50%; }
.day.selected-end { background: #4a90e2; color: white; border-radius: 0 50% 50% 0; }
.day.selected-start.selected-end { border-radius: 50%; }
.day.in-range { background: #e3f0fc; border-radius: 0; color: #333; }
.day.sunday { color: #e53935; }
.day.sunday.selected-start, .day.sunday.selected-end { color: white; }
.day.saturday { color: #1e88e5; }
.day.saturday.selected-start, .day.saturday.selected-end { color: white; }
.result-box { margin-top: 16px; background: #f8f9fa; border-radius: 10px; padding: 12px; font-size: 14px; }
.result-row { display: flex; justify-content: space-between; padding: 4px 0; }
.result-label { color: #888; }
.result-value { font-weight: bold; color: #333; }
.nights { text-align: center; color: #4a90e2; font-weight: bold; font-size: 15px; margin-top: 6px; }
.time-section { margin-top: 14px; }
.time-label { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: bold; }
.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.time-btn { padding: 8px 4px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; text-align: center; cursor: pointer; color: #555; background: white; }
.time-btn:hover { border-color: #4a90e2; color: #4a90e2; }
.time-btn.selected { background: #4a90e2; color: white; border-color: #4a90e2; }
.confirm-btn { width: 100%; margin-top: 16px; padding: 14px; background: #4a90e2; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
.confirm-btn:disabled { background: #ccc; cursor: default; }
.confirm-btn:hover:not(:disabled) { background: #357abd; }
</style>
</head>
<body>
<div class="card">
  <h2 id="page-title">📅 날짜 선택</h2>
  <p class="subtitle" id="page-subtitle">체크인 날짜를 선택해주세요</p>
  <div class="step-indicator">
    <div class="step active" id="step1">1️⃣ 시작날짜</div>
    <div class="step" id="step2">2️⃣ 종료날짜</div>
  </div>
  <div class="nav">
    <button onclick="prevMonth()">&#8249;</button>
    <span class="month-title" id="month-title"></span>
    <button onclick="nextMonth()">&#8250;</button>
  </div>
  <div class="weekdays">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="days" id="days"></div>
  <div class="result-box" id="result-box" style="display:none">
    <div class="result-row"><span class="result-label" id="start-label">시작</span><span class="result-value" id="start-value">-</span></div>
    <div class="result-row"><span class="result-label" id="end-label">종료</span><span class="result-value" id="end-value">-</span></div>
    <div class="nights" id="nights-text"></div>
  </div>
  <div class="time-section" id="start-time-section" style="display:none">
    <div class="time-label">🕐 대여 시작 시간</div>
    <div class="time-grid" id="start-time-grid"></div>
  </div>
  <div class="time-section" id="end-time-section" style="display:none">
    <div class="time-label">🕐 반납 시간</div>
    <div class="time-grid" id="end-time-grid"></div>
  </div>
  <button class="confirm-btn" id="confirm-btn" onclick="confirm()" disabled>선택 완료</button>
</div>
<script>
const industry = new URLSearchParams(location.search).get("industry") || "accommodation";
const userId = new URLSearchParams(location.search).get("userId") || "";
const isRentcar = industry === "rentcar";

let currentYear, currentMonth;
let startDate = null, endDate = null;
let step = 1;
let startTime = null, endTime = null;

const today = new Date();
today.setHours(0,0,0,0);

function init() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  if (isRentcar) {
    document.getElementById("page-title").textContent = "🚗 대여 기간 선택";
    document.getElementById("start-label").textContent = "대여 시작";
    document.getElementById("end-label").textContent = "반납일";
  } else {
    document.getElementById("page-title").textContent = "🏨 숙박 기간 선택";
    document.getElementById("start-label").textContent = "체크인";
    document.getElementById("end-label").textContent = "체크아웃";
  }
  renderCalendar();
  if (isRentcar) renderTimePicker();
}

function renderTimePicker() {
  const times = [];
  for (let h = 8; h <= 20; h++) {
    times.push(`${String(h).padStart(2,"0")}:00`);
    if (h < 20) times.push(`${String(h).padStart(2,"0")}:30`);
  }
  ["start-time-grid","end-time-grid"].forEach((id, idx) => {
    const grid = document.getElementById(id);
    grid.innerHTML = "";
    times.forEach(t => {
      const btn = document.createElement("div");
      btn.className = "time-btn";
      btn.textContent = t;
      btn.onclick = () => selectTime(t, idx === 0 ? "start" : "end");
      grid.appendChild(btn);
    });
  });
}

function selectTime(t, type) {
  if (type === "start") {
    startTime = t;
    document.querySelectorAll("#start-time-grid .time-btn").forEach(b => {
      b.classList.toggle("selected", b.textContent === t);
    });
  } else {
    endTime = t;
    document.querySelectorAll("#end-time-grid .time-btn").forEach(b => {
      b.classList.toggle("selected", b.textContent === t);
    });
  }
  updateConfirmBtn();
}

function renderCalendar() {
  const title = document.getElementById("month-title");
  title.textContent = `${currentYear}년 ${currentMonth+1}월`;
  const container = document.getElementById("days");
  container.innerHTML = "";
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement("div");
    empty.className = "day empty";
    container.appendChild(empty);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const div = document.createElement("div");
    const dow = date.getDay();
    let cls = "day";
    if (dow === 0) cls += " sunday";
    if (dow === 6) cls += " saturday";
    if (date < today) cls += " disabled";
    if (date.toDateString() === today.toDateString()) cls += " today";
    if (startDate && date.toDateString() === startDate.toDateString()) cls += " selected-start";
    if (endDate && date.toDateString() === endDate.toDateString()) cls += " selected-end";
    if (startDate && endDate && date > startDate && date < endDate) cls += " in-range";
    div.className = cls;
    div.textContent = d;
    if (date >= today) div.onclick = () => selectDay(date);
    container.appendChild(div);
  }
}

function selectDay(date) {
  if (step === 1) {
    startDate = date;
    endDate = null;
    step = 2;
    document.getElementById("step1").className = "step done";
    document.getElementById("step2").className = "step active";
    if (isRentcar) {
      document.getElementById("page-subtitle").textContent = "반납 날짜를 선택해주세요";
    } else {
      document.getElementById("page-subtitle").textContent = "체크아웃 날짜를 선택해주세요";
    }
  } else {
    if (date <= startDate) {
      startDate = date;
      endDate = null;
      return renderCalendar();
    }
    endDate = date;
    updateResult();
    if (isRentcar) {
      document.getElementById("start-time-section").style.display = "block";
      document.getElementById("end-time-section").style.display = "block";
    }
  }
  renderCalendar();
  updateResult();
}

function updateResult() {
  const box = document.getElementById("result-box");
  if (startDate) {
    box.style.display = "block";
    document.getElementById("start-value").textContent = formatDate(startDate);
  }
  if (endDate) {
    document.getElementById("end-value").textContent = formatDate(endDate);
    const diff = Math.round((endDate - startDate) / (1000*60*60*24));
    if (isRentcar) {
      document.getElementById("nights-text").textContent = `총 ${diff}일 대여`;
    } else {
      document.getElementById("nights-text").textContent = `총 ${diff}박 ${diff+1}일`;
    }
  }
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById("confirm-btn");
  if (isRentcar) {
    btn.disabled = !(startDate && endDate && startTime && endTime);
  } else {
    btn.disabled = !(startDate && endDate);
  }
}

function formatDate(d) {
  const days = ["일","월","화","수","목","금","토"];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

function confirm() {
  let result;
  if (isRentcar) {
    result = `대여 ${formatDate(startDate)} ${startTime} ~ 반납 ${formatDate(endDate)} ${endTime}`;
  } else {
    const diff = Math.round((endDate - startDate) / (1000*60*60*24));
    result = `체크인 ${formatDate(startDate)} ~ 체크아웃 ${formatDate(endDate)} (${diff}박)`;
  }
  fetch(`/webhook/calendar-select?date=${encodeURIComponent(result)}&userId=${encodeURIComponent(userId)}`)
    .then(() => {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;"><div style="text-align:center;background:white;border-radius:16px;padding:32px;max-width:320px;width:90%;box-shadow:0 2px 12px rgba(0,0,0,0.1)"><div style="font-size:48px;margin-bottom:16px">✅</div><h2 style="font-size:18px;margin-bottom:12px;color:#333">선택 완료!</h2><div style="background:#f0f7ff;border-radius:10px;padding:12px;margin-bottom:20px;font-size:14px;font-weight:bold;color:#4a90e2;">${result}</div><p style="font-size:14px;color:#555;line-height:1.8;"><b>X 버튼</b>을 눌러 창을 닫고<br>카카오톡 채팅창에서<br><b>2️⃣ 선택한 날짜 확인하기</b><br>버튼을 눌러주세요! 😊</p><script>history.pushState(null,null,location.href);window.onpopstate=function(){history.pushState(null,null,location.href);};<\/script></div></div>`;
    });
}

init();
</script>
</body>
</html>
