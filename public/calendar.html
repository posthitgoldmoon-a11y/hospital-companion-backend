<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날짜 및 시간 선택</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px 0; }
  .calendar { background: white; border-radius: 16px; padding: 20px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header h2 { font-size: 18px; color: #333; }
  .nav-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #666; padding: 5px 10px; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; }
  .weekdays span { font-size: 12px; color: #999; padding: 5px 0; }
  .weekdays span:first-child { color: #ff6b6b; }
  .weekdays span:last-child { color: #4a90e2; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day { text-align: center; padding: 8px 4px; border-radius: 50%; cursor: pointer; font-size: 14px; color: #333; }
  .day:hover:not(.disabled):not(.empty) { background: #f0f0f0; }
  .day.today { background: #fff3cd; font-weight: bold; }
  .day.selected { background: #4a90e2; color: white !important; }
  .day.disabled { color: #ccc; cursor: not-allowed; }
  .day.sunday { color: #ff6b6b; }
  .day.saturday { color: #4a90e2; }
  .day.empty { cursor: default; }
  
  .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
  
  .time-section h3 { font-size: 15px; color: #333; margin-bottom: 12px; }
  .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .time-btn { padding: 8px 4px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 12px; cursor: pointer; color: #333; text-align: center; }
  .time-btn:hover { background: #f0f0f0; }
  .time-btn.selected { background: #4a90e2; color: white; border-color: #4a90e2; }

  .selected-info { background: #f8f9fa; border-radius: 10px; padding: 12px; margin-top: 16px; font-size: 14px; color: #555; text-align: center; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .confirm-btn { width: 100%; padding: 14px; background: #4a90e2; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 14px; font-weight: bold; }
  .confirm-btn:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>
<div class="calendar">
  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
    <h2 id="monthYear"></h2>
    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
  </div>
  <div class="weekdays">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="days" id="days"></div>

  <hr class="divider">

  <div class="time-section">
    <h3>⏰ 시간 선택</h3>
    <div class="time-grid" id="timeGrid"></div>
  </div>

  <div class="selected-info" id="selectedInfo">날짜와 시간을 선택해주세요</div>
  <button class="confirm-btn" id="confirmBtn" disabled onclick="confirmDateTime()">선택 완료 ✓</button>
</div>

<script>
  let currentDate = new Date();
  let selectedDate = null;
  let selectedTime = null;
  const today = new Date();
  today.setHours(0,0,0,0);

  const times = [
    "09:00", "09:30", "10:00", "10:30",
    "11:00", "11:30", "12:00", "12:30",
    "13:00", "13:30", "14:00", "14:30",
    "15:00", "15:30", "16:00", "16:30",
    "17:00", "17:30", "18:00", "18:30",
    "19:00", "19:30", "20:00", "20:30"
  ];

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthYear').textContent = `${year}년 ${month+1}월`;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysContainer = document.getElementById('days');
    daysContainer.innerHTML = '';
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      daysContainer.appendChild(empty);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dayEl = document.createElement('div');
      const thisDate = new Date(year, month, d);
      thisDate.setHours(0,0,0,0);
      const dayOfWeek = thisDate.getDay();
      let classes = 'day';
      if (dayOfWeek === 0) classes += ' sunday';
      else if (dayOfWeek === 6) classes += ' saturday';
      if (thisDate < today) {
        classes += ' disabled';
        dayEl.className = classes;
        dayEl.textContent = d;
        daysContainer.appendChild(dayEl);
        continue;
      }
      if (thisDate.getTime() === today.getTime()) classes += ' today';
      if (selectedDate && thisDate.getTime() === selectedDate.getTime()) classes += ' selected';
      dayEl.className = classes;
      dayEl.textContent = d;
      dayEl.onclick = () => selectDate(year, month, d);
      daysContainer.appendChild(dayEl);
    }
  }

  function renderTimes() {
    const grid = document.getElementById('timeGrid');
    grid.innerHTML = '';
    times.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'time-btn' + (selectedTime === t ? ' selected' : '');
      btn.textContent = t;
      btn.onclick = () => selectTime(t);
      grid.appendChild(btn);
    });
  }

  function selectDate(year, month, day) {
    selectedDate = new Date(year, month, day);
    updateInfo();
    renderCalendar();
  }

  function selectTime(time) {
    selectedTime = time;
    updateInfo();
    renderTimes();
  }

  function updateInfo() {
    const days = ['일','월','화','수','목','금','토'];
    let info = '';
    if (selectedDate) {
      const y = selectedDate.getFullYear();
      const m = selectedDate.getMonth()+1;
      const d = selectedDate.getDate();
      const dn = days[selectedDate.getDay()];
      info += `📅 ${y}년 ${m}월 ${d}일 (${dn})`;
    }
    if (selectedTime) {
      info += `  ⏰ ${selectedTime}`;
    }
    document.getElementById('selectedInfo').textContent = info || '날짜와 시간을 선택해주세요';
    document.getElementById('confirmBtn').disabled = !(selectedDate && selectedTime);
  }

  function changeMonth(delta) {
    currentDate.setMonth(currentDate.getMonth() + delta);
    renderCalendar();
  }

  function confirmDateTime() {
    if (!selectedDate || !selectedTime) return;
    const y = selectedDate.getFullYear();
    const m = selectedDate.getMonth()+1;
    const d = selectedDate.getDate();
    const days = ['일','월','화','수','목','금','토'];
    const dn = days[selectedDate.getDay()];
    const result = `${y}년 ${m}월 ${d}일 (${dn}) ${selectedTime}`;
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: "datetime", value: result }));
    }
    const userId = getUrlParam('userId') || '';
    window.location.href = `/webhook/calendar-select?date=${encodeURIComponent(result)}&userId=${encodeURIComponent(userId)}`;
  }

  renderCalendar();
  renderTimes();

  function getUrlParam(name) {
    const url = new URLSearchParams(window.location.search);
    return url.get(name);
  }
</script>
</body>
</html>
